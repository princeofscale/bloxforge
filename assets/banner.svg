<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title description">
  <title id="title">BloxForge</title>
  <desc id="description">A local-first MCP toolkit connecting AI agents to Roblox Studio.</desc>
  <defs>
    <linearGradient id="background" x1="70" y1="10" x2="1120" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1228"/>
      <stop offset=".5" stop-color="#17163c"/>
      <stop offset="1" stop-color="#071525"/>
    </linearGradient>
    <linearGradient id="top" x1="122" y1="124" x2="330" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4b5fd"/>
      <stop offset=".5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="left" x1="122" y1="184" x2="226" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="right" x1="226" y1="184" x2="330" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312e81"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="390" y1="130" x2="850" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff"/>
      <stop offset=".62" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="violetGlow">
      <stop stop-color="#6366f1" stop-opacity=".38"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow">
      <stop stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity=".035"/>
    </pattern>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="190%">
      <feDropShadow dx="0" dy="15" stdDeviation="14" flood-color="#020617" flood-opacity=".65"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#background)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <ellipse cx="220" cy="190" rx="390" ry="320" fill="url(#violetGlow)"/>
  <ellipse cx="1040" cy="330" rx="420" ry="280" fill="url(#cyanGlow)"/>
  <rect x="1" y="1" width="1198" height="418" rx="27" fill="none" stroke="#c7d2fe" stroke-opacity=".14" stroke-width="2"/>
  <g filter="url(#shadow)">
    <path d="m226 105 116 66-116 67-116-67 116-66Z" fill="url(#top)"/>
    <path d="m110 171 116 67v133l-116-67V171Z" fill="url(#left)"/>
    <path d="m342 171-116 67v133l116-67V171Z" fill="url(#right)"/>
  </g>
  <path d="m226 238 116-67M226 238l-116-67M226 238v133" fill="none" stroke="#e0e7ff" stroke-opacity=".42" stroke-width="3"/>
  <g fill="none" stroke="#fff" stroke-linecap="round">
    <path d="m183 171 43-25 43 25-43 25-43-25Z" stroke-opacity=".75" stroke-width="4"/>
    <path d="m183 171 43 25 43-25M226 196v25" stroke-opacity=".45" stroke-width="3"/>
  </g>
  <g fill="#fff">
    <circle cx="183" cy="171" r="6"/>
    <circle cx="226" cy="146" r="7"/>
    <circle cx="269" cy="171" r="6"/>
    <circle cx="226" cy="196" r="9"/>
  </g>
  <path d="m335 78 7 18 18 7-18 7-7 18-7-18-18-7 18-7 7-18Z" fill="#67e8f9"/>
  <text x="405" y="178" fill="url(#wordmark)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">BloxForge</text>
  <text x="410" y="226" fill="#b9c2df" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="23" font-weight="500">Build, inspect and test Roblox experiences with AI agents.</text>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="650">
    <g transform="translate(410 270)">
