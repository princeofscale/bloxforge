      <text x="59" y="24" fill="#e0e7ff" text-anchor="middle">LOCAL-FIRST</text>
    </g>
    <g transform="translate(542 270)">
      <rect width="92" height="38" rx="19" fill="#6366f1" fill-opacity=".15" stroke="#818cf8" stroke-opacity=".55"/>
      <text x="46" y="24" fill="#e0e7ff" text-anchor="middle">MCP</text>
    </g>
    <g transform="translate(648 270)">
      <rect width="154" height="38" rx="19" fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".5"/>
      <text x="77" y="24" fill="#cffafe" text-anchor="middle">ROBLOX STUDIO</text>
    </g>
  </g>
  <g transform="translate(410 347)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
    <circle cx="7" cy="-5" r="7" fill="#818cf8"/>
    <path d="M17-5h120" stroke="#818cf8" stroke-width="2" stroke-dasharray="4 7"/>
    <circle cx="147" cy="-5" r="7" fill="#a5b4fc"/>
    <path d="M157-5h120" stroke="#67e8f9" stroke-width="2" stroke-dasharray="4 7"/>
    <circle cx="287" cy="-5" r="7" fill="#22d3ee"/>
    <text x="0" y="25" fill="#818aa9">AI client</text>
    <text x="121" y="25" fill="#aeb7d5">BloxForge</text>
    <text x="254" y="25" fill="#8fe8f6">Studio</text>
