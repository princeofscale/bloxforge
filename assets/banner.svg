<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Left: tilted block + nodes (logo) -->
  <g transform="translate(100,200) rotate(-12)">
    <rect x="-80" y="-80" width="160" height="160" rx="12" fill="url(#accent1)" opacity="0.85"/>
    <circle cx="-40" cy="-40" r="6" fill="url(#accent2)" opacity="0.7"/>
    <circle cx="0" cy="-40" r="6" fill="url(#accent2)" opacity="0.5"/>
    <circle cx="40" cy="-40" r="6" fill="url(#accent2)" opacity="0.3"/>
    <circle cx="-40" cy="0" r="6" fill="url(#accent2)" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="url(#accent2)" opacity="1"/>
    <circle cx="40" cy="0" r="6" fill="url(#accent2)" opacity="0.4"/>
    <circle cx="-40" cy="40" r="6" fill="url(#accent2)" opacity="0.3"/>
    <circle cx="0" cy="40" r="6" fill="url(#accent2)" opacity="0.5"/>
    <circle cx="40" cy="40" r="6" fill="url(#accent2)" opacity="0.7"/>
    <line x1="-32" y1="-40" x2="-6" y2="-40" stroke="url(#accent2)" stroke-width="1.5" opacity="0.4"/>
    <line x1="6" y1="-40" x2="34" y2="-40" stroke="url(#accent2)" stroke-width="1.5" opacity="0.3"/>
    <line x1="-40" y1="-32" x2="-40" y2="-6" stroke="url(#accent2)" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Center: title and subtitle -->
  <text x="440" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#e2e8f0">Roblox Studio MCP</text>
  <text x="440" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">Control Roblox Studio from Claude Code, Codex, Cursor &amp; AI agents</text>

  <!-- Right: architecture flow arrows -->
  <g transform="translate(900,200)">
    <!-- Agent block -->
    <rect x="-80" y="-60" width="160" height="40" rx="6" fill="#334155" opacity="0.8"/>
    <text x="0" y="-33" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">AI Agent</text>
    <!-- Arrow down -->
    <line x1="0" y1="-20" x2="0" y2="0" stroke="#6366f1" stroke-width="2"/>
    <polygon points="-5,0 5,0 0,6" fill="#6366f1"/>
    <!-- MCP block -->
    <rect x="-80" y="0" width="160" height="40" rx="6" fill="#6366f1" opacity="0.8"/>
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">MCP Server</text>
    <!-- Arrow down -->
    <line x1="0" y1="40" x2="0" y2="60" stroke="#22d3ee" stroke-width="2"/>
    <polygon points="-5,60 5,60 0,66" fill="#22d3ee"/>
    <!-- Studio block -->
    <rect x="-80" y="60" width="160" height="40" rx="6" fill="#22d3ee" opacity="0.8"/>
    <text x="0" y="87" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a" text-anchor="middle" font-weight="600">Roblox Studio</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Free · Open Source · MIT · Local-first · 130+ Tools</text>
</svg>
