<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="block" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#2a2a4a" stroke-width="4"/>
  <!-- Roblox-inspired block shape, tilted -->
  <g transform="translate(256,256) rotate(-15) translate(-256,-256)">
    <rect x="156" y="156" width="200" height="200" rx="16" fill="url(#block)" opacity="0.9"/>
    <!-- Block inner highlight -->
    <rect x="176" y="176" width="160" height="160" rx="10" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <!-- MCP node dots -->
    <circle cx="200" cy="200" r="8" fill="url(#spark)" opacity="0.8"/>
    <circle cx="256" cy="200" r="8" fill="url(#spark)" opacity="0.6"/>
    <circle cx="312" cy="200" r="8" fill="url(#spark)" opacity="0.4"/>
    <circle cx="200" cy="256" r="8" fill="url(#spark)" opacity="0.6"/>
    <circle cx="256" cy="256" r="10" fill="url(#spark)" opacity="1"/>
    <circle cx="312" cy="256" r="8" fill="url(#spark)" opacity="0.5"/>
    <circle cx="200" cy="312" r="8" fill="url(#spark)" opacity="0.4"/>
    <circle cx="256" cy="312" r="8" fill="url(#spark)" opacity="0.6"/>
    <circle cx="312" cy="312" r="8" fill="url(#spark)" opacity="0.8"/>
    <!-- Circuit/connection lines -->
    <line x1="208" y1="200" x2="248" y2="200" stroke="url(#spark)" stroke-width="2" opacity="0.5"/>
    <line x1="264" y1="200" x2="304" y2="200" stroke="url(#spark)" stroke-width="2" opacity="0.3"/>
    <line x1="200" y1="208" x2="200" y2="248" stroke="url(#spark)" stroke-width="2" opacity="0.5"/>
    <line x1="200" y1="264" x2="200" y2="304" stroke="url(#spark)" stroke-width="2" opacity="0.3"/>
    <line x1="312" y1="208" x2="312" y2="248" stroke="url(#spark)" stroke-width="2" opacity="0.4"/>
    <line x1="312" y1="264" x2="312" y2="304" stroke="url(#spark)" stroke-width="2" opacity="0.3"/>
    <line x1="248" y1="312" x2="208" y2="312" stroke="url(#spark)" stroke-width="2" opacity="0.3"/>
    <line x1="264" y1="312" x2="304" y2="312" stroke="url(#spark)" stroke-width="2" opacity="0.5"/>
    <!-- AI spark at center -->
    <circle cx="256" cy="256" r="4" fill="#fff" opacity="0.9"/>
  </g>
  <!-- Outer ring segments (MCP protocol motif) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.15"
    stroke-dasharray="8 12"/>
</svg>
