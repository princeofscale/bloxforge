name: Release

# Publishing a GitHub Release publishes both npm packages and attaches the
# freshly-built Studio plugins to that release. Requires a granular NPM_TOKEN
# with write access to both @princeofscale packages.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload plugin assets to the published release
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Install plugin dependencies
        working-directory: studio-plugin
        run: npm ci

      - name: Quality gate (lint · typecheck · test)
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Set version from tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::Release tag must be a v-prefixed SemVer (for example, v3.0.0 or v3.0.0-rc.1)."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "Releasing v$VERSION"
          RELEASE_VERSION="$VERSION" node -e 'const fs=require("node:fs");const p=JSON.parse(fs.readFileSync("package.json","utf8"));p.version=process.env.RELEASE_VERSION;fs.writeFileSync("package.json",JSON.stringify(p,null,2)+"\n")'

      - name: Build and publish
        run: node scripts/publish.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Attach plugin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            studio-plugin/MCPPlugin.rbxmx \
            studio-plugin/MCPInspectorPlugin.rbxmx \
            --clobber
