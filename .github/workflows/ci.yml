name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Lint · Typecheck · Test · Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Bridge fault-injection regression matrix
        run: npm run test:fault-injection

      - name: 10k effectively-once transport benchmark
        if: matrix.node == 20
        run: npm run test:fault-injection:10k

      - name: Build
        run: npm run build

      - name: Generated docs are current
        run: npm run docs:check

      - name: Pack dry-run (verify tarball contents)
        run: |
          npm pack --dry-run -w packages/robloxstudio-mcp
          npm pack --dry-run -w packages/robloxstudio-mcp-inspector

      - name: Doctor check (no Studio)
        run: node packages/robloxstudio-mcp/dist/index.js verify

  plugin:
    name: Studio plugin (roblox-ts compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studio-plugin/package-lock.json

      - name: Install plugin dependencies
        working-directory: studio-plugin
        run: npm ci

      - name: Compile plugin (TypeScript → Luau)
        working-directory: studio-plugin
        run: npm run build

      - name: Smoke-check compiled plugin output
        run: npm run test:plugin:smoke

  cross-platform:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --runInBand
      - run: npm run build
