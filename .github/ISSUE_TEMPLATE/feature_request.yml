name: Feature Request
description: Suggest an idea for the MCP server or plugin
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or limitation this addresses
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the tool or feature look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New tool
        - Tool improvement
        - Documentation
        - Performance
        - Safety
        - Studio plugin
        - Other
